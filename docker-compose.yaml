services:
  firefox:
    cap_add:
      - SYS_ADMIN
    image: "arxndevv/glass-fence-firefox:latest"
    restart: "unless-stopped"
    shm_size: "2gb"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 512M
    ports:
      - "8081:8080"
      - "53001:53001/udp"
    environment:
      NEKO_DESKTOP_SCREEN: 1920x1080@60
      NEKO_MEMBER_MULTIUSER_USER_PASSWORD: ${GF_USER_PASSWORD:-changeme}
      NEKO_MEMBER_MULTIUSER_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-changeme_admin}
      NEKO_WEBRTC_UDPMUX: 53001
      NEKO_WEBRTC_ICELITE: 1
      NEKO_WEBRTC_NAT1TO1: ${SERVER_PUBLIC_IP:-127.0.0.1}
      NEKO_CAPTURE_VIDEO_IDS: main
      NEKO_CAPTURE_VIDEO_CODEC: ${VIDEO_CODEC:-vp9}

  chromium:
    cap_add:
      - SYS_ADMIN
    image: "arxndevv/glass-fence-chromium:latest"
    restart: "unless-stopped"
    shm_size: "2gb"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 512M
    ports:
      - "8082:8080"
      - "53002:53002/udp"
    environment:
      NEKO_DESKTOP_SCREEN: 1920x1080@60
      NEKO_MEMBER_MULTIUSER_USER_PASSWORD: ${GF_USER_PASSWORD:-changeme}
      NEKO_MEMBER_MULTIUSER_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-changeme_admin}
      NEKO_WEBRTC_UDPMUX: 53002
      NEKO_WEBRTC_ICELITE: 1
      NEKO_WEBRTC_NAT1TO1: ${SERVER_PUBLIC_IP:-127.0.0.1}
      NEKO_CAPTURE_VIDEO_IDS: main
      NEKO_CAPTURE_VIDEO_CODEC: ${VIDEO_CODEC:-vp9}

  linux:
    cap_add:
      - SYS_ADMIN
    image: "arxndevv/glass-fence-xfce:latest"
    restart: "unless-stopped"
    shm_size: "2gb"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 512M
    ports:
      - "8084:8080"
      - "53004:53004/udp"
    environment:
      NEKO_DESKTOP_SCREEN: 1920x1080@60
      NEKO_MEMBER_MULTIUSER_USER_PASSWORD: ${GF_USER_PASSWORD:-changeme}
      NEKO_MEMBER_MULTIUSER_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-changeme_admin}
      NEKO_WEBRTC_UDPMUX: 53004
      NEKO_WEBRTC_ICELITE: 1
      NEKO_WEBRTC_NAT1TO1: ${SERVER_PUBLIC_IP:-127.0.0.1}
      NEKO_CAPTURE_VIDEO_IDS: main
      NEKO_CAPTURE_VIDEO_CODEC: ${VIDEO_CODEC:-vp9}

  ai-engine:
    build: ./ai-engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ai-model-cache:/tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ai-model-cache:
